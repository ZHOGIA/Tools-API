<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoebe's Downloader Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="container glass-panel">
        <header>
            <div class="logo-icon">
                <i class="fa-solid fa-bolt"></i>
            </div>
            <h1>Phoebe's <span>Studio</span></h1>
            <p>Download high-quality video and audio seamlessly.</p>
        </header>

        <main>
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="Paste YouTube link here..." autocomplete="off">
                <button id="fetchBtn" class="primary-btn">
                    <i class="fa-solid fa-magnifying-glass"></i> <span id="fetchText">Fetch</span>
                </button>
            </div>

            <div id="errorMsg" class="error-message"></div>

            <div id="mediaInfo" class="media-info hidden">
                <div class="thumbnail-container">
                    <img id="thumbnail" src="" alt="Video Thumbnail">
                </div>
                <div class="details">
                    <h2 id="videoTitle">Video Title</h2>
                    
                    <div class="options-group">
                        <div class="form-control">
                            <label for="formatType">Format</label>
                            <select id="formatType">
                                <option value="mp4">Video (MP4)</option>
                                <option value="mp3">Audio (MP3)</option>
                            </select>
                        </div>
                        <div class="form-control">
                            <label for="qualitySelect">Quality</label>
                            <select id="qualitySelect">
                                <!-- Dynamically populated -->
                            </select>
                        </div>
                    </div>

                    <button id="startDownloadBtn" class="action-btn">
                        <i class="fa-solid fa-cloud-arrow-down"></i> Start Processing
                    </button>
                </div>
            </div>

            <div id="progressSection" class="progress-section hidden">
                <h3 id="statusText">Starting process...</h3>
                <div class="progress-bar-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
                <div class="stats">
                    <span id="speedText">--</span>
                    <span id="etaText">--</span>
                </div>
            </div>

            <div id="resultSection" class="result-section hidden">
                <i class="fa-regular fa-circle-check success-icon"></i>
                <h3>File Ready!</h3>
                <a id="downloadLink" href="#" class="download-btn" download>
                    <i class="fa-solid fa-download"></i> Save to Device
                </a>
                <button id="newDownloadBtn" class="secondary-btn">Download Another</button>
            </div>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
